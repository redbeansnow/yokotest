<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍋 Lemonade Stand Adventure</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --yellow:      #f5c518;
      --yellow-lt:   #fff9d6;
      --yellow-dk:   #c49a00;
      --green:       #2a9d3f;
      --green-lt:    #e8f5e9;
      --red:         #d63031;
      --red-lt:      #fdecea;
      --blue:        #2563eb;
      --bg:          #fffbea;
      --card:        #ffffff;
      --border:      #e8dfa0;
      --text:        #2d2d2d;
      --muted:       #777;
      --sepia:       #fdf3e3;
      --sepia-border:#e8d5b0;
      --radius:      14px;
      --shadow:      0 2px 16px rgba(0,0,0,.10);
    }

    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background-color .7s ease;
    }

    /* ── Scene backgrounds ─────────────────────────────────────────────── */
    /* intro / default */
    body[data-scene="intro"]          { background: #fffbea; }
    /* weather */
    body[data-scene="weather-sunny"]  { background: #fffde7; }
    body[data-scene="weather-hot"]    { background: #fff3e0; }
    body[data-scene="weather-rainy"]  { background: #e3f0fb; }
    body[data-scene="weather-cloudy"] { background: #f3f4f6; }
    /* antagonist events */
    body[data-scene="hoa"]    { background: #dbeafe; --scene-header: #bfdbfe; --scene-accent: #3b82f6; --scene-hover-bg: #eff6ff; --scene-hover-border: #3b82f6; }
    body[data-scene="mob"]    { background: #ede9fe; --scene-header: #ddd6fe; --scene-accent: #7c3aed; --scene-hover-bg: #f5f3ff; --scene-hover-border: #7c3aed; }
    body[data-scene="bully"]  { background: #ffedd5; --scene-header: #fed7aa; --scene-accent: #ea580c; --scene-hover-bg: #fff7ed; --scene-hover-border: #ea580c; }
    /* quiet community days */
    body[data-scene="quiet"]  { background: #fef9ec; --scene-header: #fde68a; --scene-accent: #d97706; --scene-hover-bg: #fffbeb; --scene-hover-border: #d97706; }
    /* selling animation */
    body[data-scene="sim"]    { background: #dcfce7; --scene-header: #bbf7d0; }
    /* P&L review */
    body[data-scene="pnl"]    { background: #f0f9ff; --scene-header: #bae6fd; }
    /* endings */
    body[data-scene="ending-mogul"]      { background: #fffde7; --scene-header: #fde047; }
    body[data-scene="ending-dirty"]      { background: #f5f0ff; --scene-header: #ddd6fe; }
    body[data-scene="ending-aboveboard"] { background: #eff6ff; --scene-header: #bfdbfe; }
    body[data-scene="ending-crew"]       { background: #ffedd5; --scene-header: #fed7aa; }
    body[data-scene="ending-respectable"]{ background: #f0fdf4; --scene-header: #bbf7d0; }
    body[data-scene="ending-character"]  { background: #fdf4ff; --scene-header: #e9d5ff; }
    body[data-scene="ending-civics"]     { background: #f1f5f9; --scene-header: #cbd5e1; }

    /* scene-tinted choice hovers */
    body[data-scene="hoa"]   .choice-btn:hover,
    body[data-scene="mob"]   .choice-btn:hover,
    body[data-scene="bully"] .choice-btn:hover,
    body[data-scene="quiet"] .choice-btn:hover {
      border-color: var(--scene-hover-border, var(--yellow));
      background:   var(--scene-hover-bg,    var(--yellow-lt));
    }

    /* ── App shell ─────────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-areas: "header header" "stage pnl";
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 1rem;
      max-width: 1020px;
      margin: 0 auto;
      padding: 1rem;
      min-height: 100vh;
    }
    @media (max-width: 780px) {
      #app {
        grid-template-areas: "header" "stage" "pnl";
        grid-template-columns: 1fr;
      }
    }

    /* ── Header / HUD ──────────────────────────────────────────────────── */
    #game-header {
      grid-area: header;
      background: var(--scene-header, var(--yellow));
      transition: background .7s ease;
      border-radius: var(--radius);
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
      box-shadow: var(--shadow);
    }
    #game-header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -.5px; }
    #hud-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    #day-dots { display: flex; gap: 6px; }
    .dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: rgba(0,0,0,.15);
      transition: background .3s;
    }
    .dot.done    { background: var(--green); }
    .dot.current { background: var(--text); }
    #profit-display {
      font-size: .95rem; font-weight: 700;
      background: rgba(255,255,255,.5);
      padding: 3px 10px; border-radius: 20px;
    }
    #goal-bar-wrap { display: flex; align-items: center; gap: 6px; font-size: .8rem; font-weight: 600; }
    #goal-bar-outer {
      width: 100px; height: 10px;
      background: rgba(0,0,0,.15);
      border-radius: 10px; overflow: hidden;
    }
    #goal-bar-fill {
      height: 100%; background: var(--green);
      width: 0%; transition: width .6s ease;
      border-radius: 10px;
    }

    /* ── Stage ─────────────────────────────────────────────────────────── */
    #stage { grid-area: stage; }

    /* ── P&L panel ─────────────────────────────────────────────────────── */
    #pnl-panel {
      grid-area: pnl;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1rem;
      overflow-y: auto;
      max-height: calc(100vh - 130px);
      align-self: start;
      position: sticky;
      top: 1rem;
    }
    #pnl-panel.hidden { display: none; }
    #pnl-panel h2 { font-size: 1rem; font-weight: 700; margin-bottom: .75rem; color: var(--yellow-dk); }
    #ledger-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
    #ledger-table th {
      text-align: left; padding: 4px 6px;
      background: var(--yellow-lt); color: var(--yellow-dk);
      font-weight: 700; border-bottom: 2px solid var(--yellow);
    }
    #ledger-table td { padding: 4px 6px; border-bottom: 1px solid #f0ead0; }
    #ledger-table tfoot td { font-weight: 700; background: var(--yellow-lt); border-top: 2px solid var(--yellow); }
    .profit-cell { color: var(--green); font-weight: 700; }
    .loss-cell   { color: var(--red);   font-weight: 700; }
    #ledger-goal { margin-top: .75rem; font-size: .8rem; }
    #ledger-goal .goal-label { font-weight: 600; color: var(--muted); }

    /* ── Card base ─────────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.5rem;
    }
    .card.quiet-day {
      background: var(--sepia);
      border-color: var(--sepia-border);
    }

    /* ── Intro ─────────────────────────────────────────────────────────── */
    .intro-card { text-align: center; }
    .intro-card .big-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; }
    .intro-card h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: .5rem; }
    .intro-card p { color: var(--muted); line-height: 1.6; margin-bottom: 1.25rem; max-width: 480px; margin-left: auto; margin-right: auto; }

    /* ── Weather ───────────────────────────────────────────────────────── */
    .weather-card { text-align: center; }
    .weather-icon { font-size: 4.5rem; margin-bottom: .5rem; }
    .day-label { font-size: .8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: .25rem; }
    .day-title { font-size: 1.6rem; font-weight: 800; margin-bottom: .5rem; }
    .weather-name { font-size: 1.1rem; font-weight: 700; color: var(--yellow-dk); margin-bottom: .25rem; }
    .weather-desc { color: var(--muted); margin-bottom: 1rem; }
    .weather-mult { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: .85rem; font-weight: 700; margin-bottom: 1rem; }
    .mult-up   { background: var(--green-lt); color: var(--green); }
    .mult-down { background: var(--red-lt); color: var(--red); }
    .mult-same { background: var(--yellow-lt); color: var(--yellow-dk); }

    /* ── Event / narrative ─────────────────────────────────────────────── */
    .event-card .event-tag {
      display: inline-block; font-size: .7rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 2px 8px; border-radius: 20px;
      margin-bottom: .75rem;
    }
    .tag-hoa     { background: #e3f0ff; color: #1d4ed8; }
    .tag-mob     { background: #f3e8ff; color: #7c3aed; }
    .tag-bully   { background: #ffeee8; color: #c2410c; }
    .tag-quiet   { background: var(--green-lt); color: var(--green); }
    .tag-warning { background: var(--red-lt); color: var(--red); }
    .narrative   { line-height: 1.7; margin-bottom: 1rem; }
    .narrative strong { color: var(--text); }

    /* ── Choices ───────────────────────────────────────────────────────── */
    .choices { display: flex; flex-direction: column; gap: .75rem; margin-top: 1.25rem; }
    .choice-btn {
      display: flex; flex-direction: column; gap: 4px;
      width: 100%; text-align: left; padding: 1.25rem 1.5rem;
      border: 2px solid var(--border); border-radius: var(--radius);
      background: var(--bg); cursor: pointer;
      transition: border-color .15s, background .15s, transform .12s;
      font-family: inherit;
    }
    .choice-btn:hover  { border-color: var(--yellow); background: var(--yellow-lt); transform: translateX(6px); }
    .choice-btn:active { background: var(--yellow); }
    .choice-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .choice-btn .c-label { font-weight: 800; font-size: 1.1rem; }
    .choice-btn .c-hint  { font-size: .88rem; color: var(--muted); }
    .choice-btn .c-cost  { font-size: .88rem; font-weight: 700; color: var(--red); }
    .choice-btn .c-bonus { font-size: .88rem; font-weight: 700; color: var(--green); }

    /* ── Simulation ────────────────────────────────────────────────────── */
    .sim-card { text-align: center; }
    .sim-card .sim-emoji { font-size: 3rem; margin-bottom: .5rem; }
    .cup-counter { font-size: 3.5rem; font-weight: 900; color: var(--yellow-dk); margin: .5rem 0; line-height: 1; }
    .cup-label   { color: var(--muted); font-size: .9rem; margin-bottom: 1rem; }
    .sim-bar-outer {
      width: 100%; height: 12px; background: #eee;
      border-radius: 10px; overflow: hidden; margin-bottom: 1rem;
    }
    .sim-bar-fill {
      height: 100%; background: var(--yellow);
      width: 0%; transition: width 1.5s ease;
      border-radius: 10px;
    }

    /* ── P&L result card ───────────────────────────────────────────────── */
    .pnl-card h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 1rem; }
    .result-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: .9rem; }
    .result-table td { padding: 5px 0; border-bottom: 1px solid #f0ead0; }
    .result-table td:last-child { text-align: right; font-weight: 600; }
    .result-table .total-row td { font-weight: 800; font-size: 1rem; border-top: 2px solid var(--border); border-bottom: none; padding-top: 8px; }
    .profit-banner {
      text-align: center; padding: .75rem; border-radius: var(--radius);
      font-size: 1.3rem; font-weight: 900; margin-bottom: 1rem;
    }
    .profit-banner.pos { background: var(--green-lt); color: var(--green); }
    .profit-banner.neg { background: var(--red-lt); color: var(--red); }

    /* ── Ending ────────────────────────────────────────────────────────── */
    .ending-card { text-align: center; }
    .ending-card .end-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; }
    .ending-card h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: .5rem; }
    .ending-card .end-sub  { font-size: 1rem; color: var(--muted); margin-bottom: 1rem; }
    .ending-card .end-body { line-height: 1.7; margin-bottom: 1.5rem; max-width: 520px; margin-left: auto; margin-right: auto; }
    .final-stats { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .stat-box { background: var(--yellow-lt); border-radius: var(--radius); padding: .75rem 1.25rem; text-align: center; }
    .stat-box .s-val { font-size: 1.5rem; font-weight: 900; color: var(--yellow-dk); }
    .stat-box .s-lbl { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn-primary {
      display: inline-block; padding: 1.1rem 2.75rem;
      background: var(--yellow); color: var(--text);
      font-weight: 900; font-size: 1.15rem; border: none;
      border-radius: var(--radius); cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      letter-spacing: .01em;
    }
    .btn-primary:hover  { background: var(--yellow-dk); color: #fff; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.18); }
    .btn-primary:active { transform: scale(.97) translateY(0); }
    .btn-secondary {
      display: inline-block; padding: .85rem 1.75rem;
      background: transparent; color: var(--text);
      font-weight: 700; font-size: 1rem;
      border: 2px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: border-color .15s;
      font-family: inherit; margin-left: .5rem;
    }
    .btn-secondary:hover { border-color: var(--yellow-dk); }

    .mt1 { margin-top: 1rem; }
    .sep  { margin: 1rem 0; border: none; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
<div id="app">
  <header id="game-header">
    <h1>🍋 Lemonade Stand</h1>
    <div id="hud-right">
      <div id="day-dots"></div>
      <div id="profit-display">$0.00</div>
      <div id="goal-bar-wrap">
        <span>Goal $45</span>
        <div id="goal-bar-outer"><div id="goal-bar-fill"></div></div>
        <span id="goal-pct">0%</span>
      </div>
    </div>
  </header>
  <main id="stage"></main>
  <aside id="pnl-panel" class="hidden">
    <h2>📊 Running Ledger</h2>
    <table id="ledger-table">
      <thead>
        <tr>
          <th>Day</th><th>☁</th><th>Cups</th><th>Rev</th><th>Costs</th><th>Net</th>
        </tr>
      </thead>
      <tbody id="ledger-body"></tbody>
      <tfoot id="ledger-foot"></tfoot>
    </table>
    <div id="ledger-goal" class="mt1"></div>
  </aside>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════ */
const BASE_CUSTOMERS = 40;
const BASE_PRICE     = 1.00;
const COST_PER_CUP   = 0.28; // lemons .15 + sugar .08 + cup .05
const GOAL           = 45;

const WEATHER = {
  sunny:  { label: 'Sunny',     emoji: '☀️',  mult: 1.00, desc: 'A perfect summer day — everyone wants a cold drink.', tag: 'mult-same' },
  cloudy: { label: 'Cloudy',    emoji: '☁️',  mult: 0.85, desc: 'Mild and pleasant. Traffic is a little light.', tag: 'mult-down' },
  rainy:  { label: 'Rainy',     emoji: '🌧️', mult: 0.60, desc: 'Most folks are staying inside. Tough day ahead.', tag: 'mult-down' },
  hot:    { label: 'Heat Wave', emoji: '🔥',  mult: 1.35, desc: "Scorching hot — people are desperate for something cold.", tag: 'mult-up'  },
};

/* ═══════════════════════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════════════════════ */
let gs; // gameState — reset on new game

function freshState() {
  return {
    currentDay: 1,
    phase: 'intro',
    flags: {
      hoaCompliant: false, hoaHostile: false, hoaBribed: false, hoaShutDown: false,
      hoaVouchedNeighbors: false,
      mobRefused: false, mobFront: false, mobPending: false,
      bulliesGone: false, bulliesTolerated: false, bulliesAllied: false,
      seniorNetwork: false, dogWalkerReg: false, secretRecipe: false,
    },
    day: newDaySlate(),
    ledger: [],
    totals: { revenue: 0, ingredientCost: 0, extraCost: 0, mobCut: 0, netProfit: 0 },
  };
}

function newDaySlate() {
  return {
    weather: null,
    pricePerCup: BASE_PRICE,
    customerMult: 1.0,
    extraCost: 0,
    extraCostLabel: '',
    bonusIncome: 0,
    bonusIncomeLabel: '',
    profitSplit: 0,
    cappedDemand: false,
    hoaEventResolved: false,
  };
}

/* ═══════════════════════════════════════════════════════════════
   DAY CONFIGS  (7 days)
═══════════════════════════════════════════════════════════════ */
const DAYS = [
  /* ─── DAY 1: Grand Opening ─────────────────────────── */
  {
    dayNum: 1, title: 'Grand Opening', weather: 'sunny', quiet: false,
    eventTag: 'tag-hoa', eventTagLabel: '🏘️ HOA Visit',
    eventHTML: `
      <p class="narrative">
        You drag Grandma's old wagon to the corner of Maple Street, arrange your hand-me-down pitcher,
        and tape up a scrawled sign. The first cup isn't even poured when a man in a polo shirt and khaki
        shorts marches over, clipboard in hand.
      </p>
      <p class="narrative">
        "Name's <strong>Pemberton</strong>. Homeowners' Association." He taps the clipboard.
        "You need a <em>Neighborhood Vendor Permit</em> to operate here. That's eight dollars.
        Or…" he lowers his voice, "you could make this worth my while another way."
      </p>`,
    choices: [
      {
        label: 'Pay the $8 Vendor Permit',
        hint: "Official and above board. Pemberton can't touch you.",
        cost: '-$8.00 permit fee',
        effect(s) { s.day.extraCost += 8; s.day.extraCostLabel = 'HOA permit'; s.flags.hoaCompliant = true; }
      },
      {
        label: "Refuse — \"I'm just a kid!\"",
        hint: "Save $8, but Pemberton writes your address in his clipboard…",
        cost: 'Save $8 now; trouble Day 5',
        effect(s) { s.flags.hoaHostile = true; }
      },
      {
        label: 'Offer free samples to charm him',
        hint: "A dozen free cups. He smiles and walks away — for now.",
        cost: '-~$3 in inventory',
        effect(s) {
          // cost approx 12 cups of revenue
          s.day.customerMult *= 0.85; // selling fewer effective cups
          s.flags.hoaBribed = true;
        }
      },
    ],
  },

  /* ─── DAY 2: The Regulars ───────────────────────────── */
  {
    dayNum: 2, title: 'The Regulars', weather: 'cloudy', quiet: true,
    eventTag: 'tag-quiet', eventTagLabel: '🌿 Quiet Day',
    eventHTML: `
      <p class="narrative">
        No drama today — just the neighborhood doing its thing. Around eleven, a tiny woman
        with silver hair and flour on her apron shuffles up to the stand.
        "<strong>Mrs. Chen</strong>," she says, extending a hand. "Retired baker.
        Your setup reminds me of my granddaughter." She peers into the pitcher approvingly.
      </p>
      <p class="narrative">
        Before you can answer, a golden retriever bounds up and nearly knocks the whole table over.
        Its owner, a young guy with three leashes tangled around his arm, apologizes breathlessly.
        Behind him: four more dog walkers, all looking sweaty and thirsty.
      </p>`,
    choices: [
      {
        label: 'Pour Mrs. Chen a free cup and chat',
        hint: "She's delighted. She promises to spread the word to her bridge club.",
        bonus: '+10% customers Day 3 (senior network)',
        effect(s) {
          s.day.customerMult *= 0.97; // lose ~1 cup worth
          s.flags.seniorNetwork = true;
        }
      },
      {
        label: 'Set out a water bowl for the dogs',
        hint: "A dollar for a bowl. The dog walkers are instantly loyal.",
        cost: '-$1.00 (bowl)',
        bonus: '+8% customers Days 3–4',
        effect(s) { s.day.extraCost += 1; s.day.extraCostLabel = 'Dog bowl'; s.flags.dogWalkerReg = true; }
      },
      {
        label: 'Keep things professional — just sell',
        hint: 'No frills, no extras. Solid baseline day.',
        effect(s) { /* no change */ }
      },
    ],
  },

  /* ─── DAY 3: A Stranger's Offer ─────────────────────── */
  {
    dayNum: 3, title: "A Stranger's Offer", weather: 'hot', quiet: false,
    eventTag: 'tag-mob', eventTagLabel: '🕴️ Suspicious Visitor',
    eventHTML(s) {
      const bonuses = [];
      if (s.flags.seniorNetwork) bonuses.push('Mrs. Chen\'s bridge club stops by in force');
      if (s.flags.dogWalkerReg)  bonuses.push('the regular dog walkers are back with friends');
      const bonusLine = bonuses.length
        ? `<p class="narrative" style="color:var(--green);font-weight:600">✓ ${bonuses.join(' and ')}.</p>` : '';
      return `
        ${bonusLine}
        <p class="narrative">
          The heat is brutal and business is booming — your best day yet.
          Then a man in an expensive suit strolls up. He doesn't look thirsty.
        </p>
        <p class="narrative">
          "<strong>Big Sal</strong>," he says, sliding a business card across the table.
          "I run a few… enterprises in this neighborhood. Your little setup here —
          I like it. I can send a lot of customers your way." He pauses.
          "In return, thirty cents on every dollar. Think of it as a partnership."
        </p>
        <p class="narrative">
          His smile doesn't quite reach his eyes.
        </p>`;
    },
    choices: [
      {
        label: "Decline politely — \"Thanks, but no thanks\"",
        hint: "He nods slowly. A little too slowly.",
        cost: 'Day 6: sign vandalized (-$10 repair)',
        effect(s) { s.flags.mobRefused = true; }
      },
      {
        label: "Accept the deal — become a front",
        hint: "Customers start appearing out of nowhere. The math gets complicated.",
        bonus: '+40% customers Days 4–7',
        cost: '-30% profit split Days 4–7',
        effect(s) { s.flags.mobFront = true; }
      },
      {
        label: "Play dumb — \"I'm just a kid selling lemonade!\"",
        hint: "He laughs. But you notice him speak to someone on his phone as he walks away.",
        cost: 'Day 6: his observer returns with the same offer',

/* ═══════════════════════════════════════════════════════════════
   P&L ENGINE
═══════════════════════════════════════════════════════════════ */
function simulateSales(s) {
  const w = WEATHER[s.day.weather];
  const wMult = w ? w.mult : 1.0;

  // Flag-driven customer bonuses
  let flagMult = 1.0;
  const d = s.currentDay;
  if (s.flags.seniorNetwork && d >= 3) flagMult *= 1.10;
  if (s.flags.dogWalkerReg  && d >= 3 && d <= 4) flagMult *= 1.08;
  if (s.flags.secretRecipe  && d >= 5) flagMult *= 1.15;
  if (s.flags.mobFront      && d >= 4) flagMult *= 1.40;

  const price = s.day.pricePerCup;
  const priceEffect = Math.max(0.2, 1.0 - (price - 1.0) * 0.3);

  let customers = Math.floor(BASE_CUSTOMERS * wMult * s.day.customerMult * flagMult * priceEffect);
  if (s.day.cappedDemand) customers = Math.floor(customers * 0.60);

  const revenue        = +(customers * price).toFixed(2);
  const ingredientCost = +(customers * COST_PER_CUP).toFixed(2);
  const extraCost      = +s.day.extraCost.toFixed(2);

  // Charity mode: $1/cup goes to charity (reduces effective revenue)
  let charityDonation = 0;
  if (s.day.charityMode) charityDonation = customers * 1.00; // $1 per cup donated

  const bonusIncome = +(s.day.bonusIncome || 0).toFixed(2);
  const grossProfit = revenue + bonusIncome - ingredientCost - extraCost - charityDonation;
  const mobCut      = s.flags.mobFront && !s.flags.tookBuyout && s.day.profitSplit > 0
    ? +(Math.max(0, grossProfit) * s.day.profitSplit).toFixed(2) : 0;
  const bulletinCut = s.day.profitSplit > 0 && !s.flags.mobFront
    ? +(Math.max(0, grossProfit) * s.day.profitSplit).toFixed(2) : 0; // bully cut Day 7
  const totalSplit  = +(mobCut + bulletinCut).toFixed(2);
  const netProfit   = +(grossProfit - totalSplit).toFixed(2);

  return { customers, revenue, bonusIncome, ingredientCost, extraCost, charityDonation, mobCut, bulletinCut, totalSplit, netProfit };
}

function applyMobFrontSplit(s) {
  if (s.flags.mobFront && !s.flags.tookBuyout) s.day.profitSplit = Math.max(s.day.profitSplit, 0.30);
}

function pushLedger(s, result) {
  const entry = {
    day:    s.currentDay,
    weather: s.day.weather,
    cups:   result.customers,
    revenue: result.revenue,
    ingredientCost: result.ingredientCost,
    extraCost: result.extraCost + result.charityDonation,
    mobCut:  result.mobCut + result.bulletinCut,
    netProfit: result.netProfit,
    extraCostLabel: s.day.extraCostLabel,
    charityDonation: result.charityDonation,
  };
  s.ledger.push(entry);
  // recompute totals
  s.totals = s.ledger.reduce((t, e) => ({
    revenue:       +(t.revenue       + e.revenue).toFixed(2),
    ingredientCost:+(t.ingredientCost+ e.ingredientCost).toFixed(2),
    extraCost:     +(t.extraCost     + e.extraCost).toFixed(2),
    mobCut:        +(t.mobCut        + (e.mobCut||0)).toFixed(2),
    netProfit:     +(t.netProfit     + e.netProfit).toFixed(2),
  }), { revenue:0, ingredientCost:0, extraCost:0, mobCut:0, netProfit:0 });
}

/* ═══════════════════════════════════════════════════════════════
   ENDING KEY
═══════════════════════════════════════════════════════════════ */
function getEndingKey(s) {
  if (s.flags.hoaShutDown) return 'civics';
  const p = s.totals.netProfit;
  if (p >= GOAL) {
    if (s.flags.mobFront && !s.flags.tookBuyout) return 'dirty';
    if (s.flags.hoaCompliant && s.flags.secretRecipe) return 'aboveboard';
    if (s.flags.bulliesAllied) return 'crew';
    return 'mogul';
  }
  if (p >= 20) return 'respectable';
  return 'character';
}

/* ═══════════════════════════════════════════════════════════════
   HUD UPDATE
═══════════════════════════════════════════════════════════════ */
function updateHud() {
  // Day dots
  const dots = document.getElementById('day-dots');
  dots.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < gs.currentDay ? ' done' : (i === gs.currentDay ? ' current' : ''));
    dots.appendChild(d);
  }
  // Profit
  const profit = gs.totals.netProfit;
  const pd = document.getElementById('profit-display');
  pd.textContent = fmt(profit);
  pd.style.color = profit >= 0 ? '#1a5c2a' : '#c0392b';
  // Goal bar
  const pct = Math.min(100, Math.max(0, (profit / GOAL) * 100)).toFixed(0);
  document.getElementById('goal-bar-fill').style.width = pct + '%';
  document.getElementById('goal-pct').textContent = pct + '%';
  // Ledger
  updateLedger();
}

function updateLedger() {
  if (!gs.ledger.length) { document.getElementById('pnl-panel').classList.add('hidden'); return; }
  document.getElementById('pnl-panel').classList.remove('hidden');
  const body = document.getElementById('ledger-body');
  body.innerHTML = gs.ledger.map(e => {
    const w = WEATHER[e.weather];
    const cls = e.netProfit >= 0 ? 'profit-cell' : 'loss-cell';
    return `<tr>
      <td>${e.day}</td>
      <td title="${w ? w.label : ''}">${w ? w.emoji : '?'}</td>
      <td>${e.cups}</td>
      <td>${fmt(e.revenue)}</td>
      <td>${fmt(e.ingredientCost + e.extraCost + (e.mobCut||0))}</td>
      <td class="${cls}">${fmt(e.netProfit)}</td>
    </tr>`;
  }).join('');
  const t = gs.totals;
  document.getElementById('ledger-foot').innerHTML = `<tr>
    <td colspan="3"><strong>Total</strong></td>
    <td><strong>${fmt(t.revenue)}</strong></td>
    <td><strong>${fmt(t.ingredientCost + t.extraCost + t.mobCut)}</strong></td>
    <td class="${t.netProfit >= 0 ? 'profit-cell' : 'loss-cell'}"><strong>${fmt(t.netProfit)}</strong></td>
  </tr>`;
  const goalPct = Math.min(100, (t.netProfit / GOAL * 100)).toFixed(0);
  document.getElementById('ledger-goal').innerHTML =
    `<span class="goal-label">Goal $${GOAL}: </span>
     <strong style="color:${t.netProfit >= GOAL ? 'var(--green)' : 'var(--text)'}">${fmt(t.netProfit)} / $${GOAL} (${goalPct}%)</strong>`;
}

function fmt(n) {
  const abs = Math.abs(n).toFixed(2);
  return n < 0 ? `-$${abs}` : `$${abs}`;
}

const stage = () => document.getElementById('stage');

function setStage(html) { stage().innerHTML = html; }

function btn(id, handler) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('click', handler);
}

function renderChoiceButtons(choices, onPick) {
  return choices.map((c, i) => `
    <button class="choice-btn" data-idx="${i}">
      <span class="c-label">${c.label}</span>
      ${c.hint  ? `<span class="c-hint">${c.hint}</span>` : ''}
      ${c.cost  ? `<span class="c-cost">⚠ ${c.cost}</span>` : ''}
      ${c.bonus ? `<span class="c-bonus">✓ ${c.bonus}</span>` : ''}
    </button>`).join('');
}

function attachChoiceBtns(choices, onPick) {
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      const idx = parseInt(btn.dataset.idx);
      onPick(choices[idx], idx);
    });
  });
}

    <div class="card intro-card">
      <span class="big-emoji">🍋</span>
      <h2>Lemonade Stand Adventure</h2>
      <p>It's the last week of summer. Grandma has given you her old wagon, a bag of lemons,
         and a $20 seed loan. You have <strong>7 days</strong> to prove you can run a real business.</p>
      <p>Make your choices wisely — the weather, the HOA, a man named Big Sal, and the neighborhood
         all have opinions about your little stand.</p>
      <p>Can you earn <strong>$45 profit</strong> before school starts?</p>
      <button class="btn-primary" id="btn-start">Start the Adventure →</button>
    </div>`);
  btn('btn-start', () => { gs.currentDay = 1; renderWeather(); });
}

/* ── WEATHER ─────────────────────────────────────────────────── */
function day6Weather() {
  // Day 6 weather is dynamic: cloudy if mob is involved, sunny otherwise
  if (gs.flags.mobFront || gs.flags.mobRefused || gs.flags.mobPending) return 'cloudy';
  return 'sunny';
}

function renderWeather() {
  const cfg = DAYS[gs.currentDay - 1];
  const weatherKey = cfg.weather || (gs.currentDay === 6 ? day6Weather() : 'sunny');
  gs.day = newDaySlate();
  gs.day.weather = weatherKey;

  setScene('weather-' + weatherKey);

  // Apply mob front split on appropriate days
  if (gs.flags.mobFront && gs.currentDay >= 4) applyMobFrontSplit(gs);

  const w = WEATHER[weatherKey];
  const multLabel = w.mult > 1 ? `+${Math.round((w.mult-1)*100)}% customers` :
                    w.mult < 1 ? `-${Math.round((1-w.mult)*100)}% customers` : 'Normal traffic';
  const multClass = w.mult > 1 ? 'mult-up' : w.mult < 1 ? 'mult-down' : 'mult-same';
  const cardClass = cfg.quiet ? 'card quiet-day' : 'card';

  updateHud();
  setStage(`
    <div class="${cardClass} weather-card">
      <div class="day-label">Day ${gs.currentDay} of 7</div>
      <div class="day-title">${cfg.title}</div>
      <div class="weather-icon">${w.emoji}</div>
      <div class="weather-name">${w.label}</div>
      <div class="weather-desc">${w.desc}</div>
      <div class="weather-mult ${multClass}">${multLabel}</div>
      <button class="btn-primary" id="btn-to-event">See What's Happening →</button>
    </div>`);
  btn('btn-to-event', renderEvent);
}

/* ── EVENT ───────────────────────────────────────────────────── */
function renderEvent() {
  setScene(sceneForDay(gs.currentDay));
  const cfg = DAYS[gs.currentDay - 1];
  const cardClass = cfg.quiet ? 'card quiet-day' : 'card';
  const eventBody = typeof cfg.eventHTML === 'function' ? cfg.eventHTML(gs) : cfg.eventHTML;

  // HOA sub-event on Day 5
  if (cfg.hasHoaSubEvent && (gs.flags.hoaHostile || gs.flags.hoaBribed) && !gs.day.hoaEventResolved) {
    setStage(`
      <div class="${cardClass} event-card">
        <span class="event-tag ${cfg.eventTag}">${cfg.eventTagLabel}</span>
        ${eventBody}
        <hr class="sep">
        <p style="font-weight:700;margin-bottom:.5rem;">How do you handle Pemberton?</p>
        <div class="choices">${renderChoiceButtons(cfg.hoaChoices)}</div>
      </div>`);
    attachChoiceBtns(cfg.hoaChoices, (choice) => {
      choice.effect(gs);
      if (gs.flags.hoaShutDown) { renderShutdown(); return; }
      setTimeout(() => renderBulliesChoice(), 400);
    });
    return;
  }

  // Mob pending sub-event on Day 6
  if (cfg.hasMobSubEvent && gs.flags.mobPending) {
    setStage(`
      <div class="${cardClass} event-card">
        <span class="event-tag ${cfg.eventTag}">${cfg.eventTagLabel}</span>
        ${eventBody}
        <hr class="sep">
        <p style="font-weight:700;margin-bottom:.5rem;">What do you do with Big Sal's offer?</p>
        <div class="choices">${renderChoiceButtons(cfg.mobPendingChoices)}</div>
      </div>`);
    attachChoiceBtns(cfg.mobPendingChoices, (choice) => {
      choice.effect(gs);
      setTimeout(() => renderDayChoices(), 400);
    });
    return;
  }

  // Day 7 special sub-events
  if (gs.currentDay === 7) {
    if (cfg.hasDay7HoaSettle && gs.flags.hoaHostile && !gs.flags.hoaCompliant) {
      setStage(`
        <div class="${cardClass} event-card">
          <span class="event-tag ${cfg.eventTag}">${cfg.eventTagLabel}</span>
          ${eventBody}
          <hr class="sep">
          <p style="font-weight:700;margin-bottom:.5rem;">The HOA ultimatum:</p>
          <div class="choices">${renderChoiceButtons(cfg.day7HoaChoices)}</div>
        </div>`);
      attachChoiceBtns(cfg.day7HoaChoices, (choice) => {
        choice.effect(gs);
        if (gs.flags.hoaShutDown) { renderShutdown(); return; }
        setTimeout(() => renderDay7Sub2(), 400);
      });
      return;
    }
    renderDay7Sub2();
    return;
  }

  renderMainEventAndChoices(cfg, cardClass, eventBody);
}

function renderDay7Sub2() {
  const cfg = DAYS[6]; // Day 7
  const cardClass = 'card';
  const eventBody = typeof cfg.eventHTML === 'function' ? cfg.eventHTML(gs) : cfg.eventHTML;

  if (cfg.hasMobBuyout && gs.flags.mobFront) {
    setStage(`
      <div class="${cardClass} event-card">
        <span class="event-tag tag-mob">🕴️ Big Sal's Offer</span>
        ${eventBody}
        <hr class="sep">
        <div class="choices">${renderChoiceButtons(cfg.mobBuyoutChoices)}</div>
      </div>`);
    attachChoiceBtns(cfg.mobBuyoutChoices, (choice) => {
      choice.effect(gs);
      setTimeout(() => renderDay7Sub3(), 400);
    });
    return;
  }
  renderDay7Sub3();
}

function renderDay7Sub3() {
  const cfg = DAYS[6];
  const cardClass = 'card';
  const eventBody = typeof cfg.eventHTML === 'function' ? cfg.eventHTML(gs) : cfg.eventHTML;

  if (cfg.hasBulliesAlliedCut && gs.flags.bulliesAllied) {
    setStage(`
      <div class="${cardClass} event-card">
        <span class="event-tag tag-bully">👊 Marco's Crew</span>
        ${eventBody}
        <hr class="sep">
        <p style="font-weight:700;margin-bottom:.5rem;">Marco and his crew want a cut:</p>
        <div class="choices">${renderChoiceButtons(cfg.bulliesCutChoices)}</div>
      </div>`);
    attachChoiceBtns(cfg.bulliesCutChoices, (choice) => {
      choice.effect(gs);
      setTimeout(() => renderDayChoices(), 400);
    });
    return;
  }
  renderDayChoices();
}

function renderBulliesChoice() {
  const cfg = DAYS[4]; // Day 5
  const cardClass = 'card';
  setStage(`
    <div class="${cardClass} event-card">
      <span class="event-tag tag-bully">😤 Trouble Brewing</span>
      <p class="narrative">Back to the main problem: Marco and his crew are still helping themselves to your cups.</p>
      <div class="choices">${renderChoiceButtons(cfg.choices)}</div>
    </div>`);
  attachChoiceBtns(cfg.choices, (choice) => {
    choice.effect(gs);
    setTimeout(() => renderSimulation(), 400);
  });
}

function renderMainEventAndChoices(cfg, cardClass, eventBody) {
  setStage(`
    <div class="${cardClass} event-card">
      <span class="event-tag ${cfg.eventTag}">${cfg.eventTagLabel}</span>
      ${eventBody}
      <hr class="sep">
      <p style="font-weight:700;margin-bottom:.5rem;">What do you do?</p>
      <div class="choices">${renderChoiceButtons(cfg.choices)}</div>
    </div>`);
  attachChoiceBtns(cfg.choices, (choice) => {
    choice.effect(gs);
    setTimeout(() => renderSimulation(), 400);
  });
}

function renderDayChoices() {
  const cfg = DAYS[gs.currentDay - 1];
  const cardClass = cfg.quiet ? 'card quiet-day' : 'card';
  setStage(`
    <div class="${cardClass} event-card">
      <span class="event-tag ${cfg.eventTag}">${cfg.eventTagLabel}</span>
      <p class="narrative">Now — how do you run today's stand?</p>
      <div class="choices">${renderChoiceButtons(cfg.choices)}</div>
    </div>`);
  attachChoiceBtns(cfg.choices, (choice) => {
    choice.effect(gs);
    setTimeout(() => renderSimulation(), 400);
  });
}

/* ── SIMULATION ──────────────────────────────────────────────── */
function renderSimulation() {
  setScene('sim');
  // Apply mob front split before simulation
  if (gs.flags.mobFront && !gs.flags.tookBuyout && gs.currentDay >= 4) {
    gs.day.profitSplit = Math.max(gs.day.profitSplit, 0.30);
  }

  const result = simulateSales(gs);

  setStage(`
    <div class="card sim-card">
      <div class="sim-emoji">🍹</div>
      <div class="day-label">Day ${gs.currentDay} — Selling…</div>
      <div class="cup-counter" id="cup-count">0</div>
      <div class="cup-label">cups sold</div>
      <div class="sim-bar-outer"><div class="sim-bar-fill" id="sim-bar"></div></div>
    </div>`);

  // Animate
  const target = result.customers;
  const duration = 1500;
  const start = performance.now();
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    document.getElementById('cup-count').textContent = Math.floor(ease * target);
    const bar = document.getElementById('sim-bar');
    if (bar) bar.style.width = (ease * 100) + '%';
    if (t < 1) requestAnimationFrame(frame);
    else {
      document.getElementById('cup-count').textContent = target;
      if (bar) bar.style.width = '100%';
      setTimeout(() => { pushLedger(gs, result); renderPnL(result); }, 400);
    }
  }
  requestAnimationFrame(frame);
}

/* ── P&L RESULT ──────────────────────────────────────────────── */
function renderPnL(result) {
  setScene('pnl');
  updateHud();
  const isLast = gs.currentDay === 7;
  const profitClass = result.netProfit >= 0 ? 'pos' : 'neg';
  const rows = [
    ['Cups sold',         result.customers + ' cups'],
    ['Price per cup',     '$' + gs.day.pricePerCup.toFixed(2)],
    ['Revenue',          fmt(result.revenue)],
    ['— Ingredient costs', fmt(-result.ingredientCost)],
  ];
  if (result.bonusIncome > 0)  rows.push([`+ ${gs.day.bonusIncomeLabel || 'Bonus income'}`, fmt(result.bonusIncome)]);
  if (result.extraCost > 0)    rows.push([`— ${gs.day.extraCostLabel || 'Extra costs'}`, fmt(-result.extraCost)]);
  if (result.charityDonation > 0) rows.push(['— Charity donation', fmt(-result.charityDonation)]);
  if ((result.mobCut||0) > 0)  rows.push(['— Protection fee (Sal)', fmt(-result.mobCut)]);

  setStage(`
    <div class="card pnl-card">
      <h3>Day ${gs.currentDay} Results</h3>
      <table class="result-table">
        ${rows.map(([l,v]) => `<tr><td>${l}</td><td>${v}</td></tr>`).join('')}
        <tr class="total-row"><td>Net profit today</td><td>${fmt(result.netProfit)}</td></tr>
      </table>
      <div class="profit-banner ${profitClass}">
        ${result.netProfit >= 0 ? '+' : ''}${fmt(result.netProfit)} today
        &nbsp;·&nbsp; ${fmt(gs.totals.netProfit)} total
      </div>
      <button class="btn-primary" id="btn-next">
        ${isLast ? 'See Final Results 🏁' : 'Day ' + (gs.currentDay + 1) + ' →'}
      </button>
    </div>`);

  btn('btn-next', () => {
    if (isLast) { renderEnding(); }
    else { gs.currentDay++; renderWeather(); }
  });
}

/* ── SHUTDOWN (early ending) ─────────────────────────────────── */
function renderShutdown() {
  setScene('ending-civics');
  gs.flags.hoaShutDown = true;
  updateHud();
  setStage(`
    <div class="card ending-card">
      <span class="big-emoji">📜</span>
      <h2>Civics Lesson</h2>
      <p class="end-sub">HOA: 1 — You: 0</p>
      <p class="end-body">${ENDINGS.civics.body}</p>
      <div class="final-stats">
        <div class="stat-box"><div class="s-val">${gs.currentDay}</div><div class="s-lbl">Days Survived</div></div>
        <div class="stat-box"><div class="s-val">${fmt(gs.totals.netProfit)}</div><div class="s-lbl">Total Profit</div></div>
      </div>
      <button class="btn-primary" id="btn-replay">Play Again</button>
    </div>`);
  document.getElementById('pnl-panel').classList.remove('hidden');
  btn('btn-replay', () => { gs = freshState(); updateHud(); renderIntro(); });
}

/* ── ENDING ──────────────────────────────────────────────────── */
function renderEnding() {
  const key = getEndingKey(gs);
  setScene('ending-' + key);
  const end = ENDINGS[key];
  updateHud();

  const totalCups = gs.ledger.reduce((s, e) => s + e.cups, 0);
  const bestDay   = gs.ledger.reduce((b, e) => e.netProfit > b.netProfit ? e : b, gs.ledger[0]);

  setStage(`
    <div class="card ending-card">
      <span class="big-emoji">${end.emoji}</span>
      <h2>${end.title}</h2>
      <p class="end-sub">${end.sub}</p>
      <p class="end-body">${end.body}</p>
      <div class="final-stats">
        <div class="stat-box">
          <div class="s-val">${fmt(gs.totals.netProfit)}</div>
          <div class="s-lbl">Total Profit</div>
        </div>
        <div class="stat-box">
          <div class="s-val">${totalCups}</div>
          <div class="s-lbl">Cups Sold</div>
        </div>
        <div class="stat-box">
          <div class="s-val">${fmt(gs.totals.revenue)}</div>
          <div class="s-lbl">Total Revenue</div>
        </div>
        <div class="stat-box">
          <div class="s-val">Day ${bestDay ? bestDay.day : '—'}</div>
          <div class="s-lbl">Best Day</div>
        </div>
      </div>
      <button class="btn-primary" id="btn-replay">Play Again</button>
      <button class="btn-secondary" id="btn-review">Review Ledger</button>
    </div>`);
  document.getElementById('pnl-panel').classList.remove('hidden');
  btn('btn-replay', () => { gs = freshState(); updateHud(); renderIntro(); });
  btn('btn-review', () => { document.getElementById('pnl-panel').scrollIntoView({ behavior: 'smooth' }); });
}

/* ═══════════════════════════════════════════════════════════════
   SCENE MANAGER
═══════════════════════════════════════════════════════════════ */
function setScene(name) {
  document.body.dataset.scene = name;
}

function sceneForDay(dayNum) {
  if (!dayNum || dayNum < 1) return 'intro';
  const cfg = DAYS[dayNum - 1];
  if (cfg.quiet) return 'quiet';
  if (cfg.eventTag === 'tag-hoa') return 'hoa';
  if (cfg.eventTag === 'tag-mob') return 'mob';
  if (cfg.eventTag === 'tag-bully') return 'bully';
  return 'intro';
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  gs = freshState();
  updateHud();
  renderIntro();
});
</script>
</body>
