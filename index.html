<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍋 Lemonade Stand Adventure</title>
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --yellow:       #f5c518;
      --yellow-lt:    #fef9d9;
      --yellow-dk:    #b8860b;
      --green:        #2a7a3f;
      --green-lt:     #d1f0d8;
      --red:          #b03020;
      --red-lt:       #fde8e8;
      --blue:         #2355b0;
      --bg:           #ede5d8;
      --paper:        #fdfaf3;
      --paper-warm:   #fef8ec;
      --border:       #c4a870;
      --text:         #2a1f0e;
      --muted:        #8a7a60;
      --ink:          #1a1208;
      --radius:       3px;
      --shadow-card:  3px 3px 0 #b09060, 6px 6px 0 #a08050, 8px 8px 20px rgba(0,0,0,.20);
      --shadow-sm:    2px 2px 0 #c4a870, 3px 3px 8px rgba(0,0,0,.12);
      --font-hand:    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background-color .8s ease;
      /* faint ruled lines like notebook paper */
      background-image: repeating-linear-gradient(
        180deg,
        transparent, transparent 27px,
        rgba(150,120,70,.06) 28px
      );
    }

    /* ── Scene backgrounds — muted construction paper ───────────────── */
    body[data-scene="intro"]            { background-color: #ede5d8; }
    body[data-scene="weather-sunny"]    { background-color: #f0e8d0; }
    body[data-scene="weather-hot"]      { background-color: #f0dfc0; }
    body[data-scene="weather-rainy"]    { background-color: #ccd8e8; }
    body[data-scene="weather-cloudy"]   { background-color: #d8dadc; }
    body[data-scene="hoa"]    { background-color: #c8d8ee; --scene-header: #b0c8e8; --scene-hover-bg: #dce8f8; --scene-hover-border: #3b6acc; --tape-color: rgba(140,190,255,.55); }
    body[data-scene="mob"]    { background-color: #ccc0e0; --scene-header: #baaee0; --scene-hover-bg: #e4daf8; --scene-hover-border: #6644cc; --tape-color: rgba(180,150,255,.55); }
    body[data-scene="bully"]  { background-color: #e8d4b0; --scene-header: #e0c080; --scene-hover-bg: #f8ead8; --scene-hover-border: #cc5510; --tape-color: rgba(255,160,80,.55); }
    body[data-scene="quiet"]  { background-color: #e8e0b8; --scene-header: #e0cc70; --scene-hover-bg: #f8f4d8; --scene-hover-border: #aa8800; --tape-color: rgba(255,220,60,.55); }
    body[data-scene="sim"]    { background-color: #b8d8c0; --scene-header: #90c8a0; }
    body[data-scene="pnl"]    { background-color: #ccd8e0; --scene-header: #a8c4d8; }
    body[data-scene="ending-mogul"]      { background-color: #f0e8c0; --scene-header: #e8cc40; }
    body[data-scene="ending-dirty"]      { background-color: #ccc0e0; --scene-header: #baaee0; }
    body[data-scene="ending-aboveboard"] { background-color: #c8d8ee; --scene-header: #a8c4e8; }
    body[data-scene="ending-respectable"]{ background-color: #c0d8c8; --scene-header: #90c0a0; }
    body[data-scene="ending-character"]  { background-color: #d8c8e8; --scene-header: #c0a8e0; }
    body[data-scene="ending-civics"]     { background-color: #ccd0d8; --scene-header: #a8b4c0; }
    body[data-scene="ending-mob-takeover"] { background-color: #1a0a2a; --scene-header: #3a1a5a; color: #e8d8f8; }

    /* scene-tinted choice left-tab + hover */
    body[data-scene="hoa"]   .choice-btn { border-left-color: #3b6acc; }
    body[data-scene="mob"]   .choice-btn { border-left-color: #6644cc; }
    body[data-scene="bully"] .choice-btn { border-left-color: #cc5510; }
    body[data-scene="quiet"] .choice-btn { border-left-color: #aa8800; }
    body[data-scene="hoa"]   .choice-btn:hover,
    body[data-scene="mob"]   .choice-btn:hover,
    body[data-scene="bully"] .choice-btn:hover,
    body[data-scene="quiet"] .choice-btn:hover {
      border-color: var(--scene-hover-border, var(--yellow-dk));
      border-left-width: 7px;
      background: var(--scene-hover-bg, var(--yellow-lt));
    }

    /* tape color per scene — targets the card ::before strip */
    body[data-scene="hoa"]   #stage .card::before { background: rgba(140,190,255,.55); }
    body[data-scene="mob"]   #stage .card::before { background: rgba(180,150,255,.55); }
    body[data-scene="bully"] #stage .card::before { background: rgba(255,160,80,.55); }
    body[data-scene="quiet"] #stage .card::before { background: rgba(255,220,60,.55); }
    body[data-scene="sim"]   #stage .card::before { background: rgba(100,200,130,.55); }
    body[data-scene="pnl"]   #stage .card::before { background: rgba(120,180,220,.55); }

    /* ── App shell ─────────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-areas: "header header" "stage pnl";
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      gap: 1.25rem;
      max-width: 1040px;
      margin: 0 auto;
      padding: 1.25rem;
      min-height: 100vh;
    }
    @media (max-width: 780px) {
      #app { grid-template-areas: "header" "stage" "pnl"; grid-template-columns: 1fr; }
    }

    /* ── Header — manila folder tab ────────────────────────────────────── */
    #game-header {
      grid-area: header;
      background: var(--scene-header, #f5c518);
      transition: background .8s ease;
      border-radius: 4px 4px 0 0;
      border: 2px solid rgba(0,0,0,.12);
      border-bottom: 3px solid rgba(0,0,0,.18);
      padding: .85rem 1.4rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .5rem;
      box-shadow: 3px 3px 0 rgba(0,0,0,.15), 4px 4px 10px rgba(0,0,0,.12);
      font-family: var(--font-hand);
      position: relative;
    }
    /* folder tab notch */
    #game-header::after {
      content: '';
      position: absolute; bottom: -8px; left: 0; right: 0;
      height: 6px;
      background: inherit;
      filter: brightness(.92);
    }
    #game-header h1 {
      font-family: var(--font-hand); font-size: 1.8rem;
      font-weight: 800; letter-spacing: .02em;
    }
    #hud-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }

    /* Day dots — sticker circles */
    #day-dots { display: flex; gap: 8px; }
    .dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(0,0,0,.15);
      transition: background .3s, outline .3s;
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 700; color: #fff;
    }
    .dot.done    { background: var(--green); }
    .dot.done::after { content: '✓'; }
    .dot.current { background: var(--ink); outline: 2px dashed rgba(0,0,0,.35); outline-offset: 2px; }

    /* Profit display — stamp badge */
    #profit-display {
      font-family: var(--font-hand); font-size: 1.1rem; font-weight: 700;
      background: rgba(255,255,255,.55);
      padding: 3px 12px; border-radius: 3px;
      border: 1px solid rgba(0,0,0,.15);
      box-shadow: 1px 1px 0 rgba(0,0,0,.15);
    }

    /* Goal bar — ruler style */
    #goal-bar-wrap {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-hand); font-size: .95rem; font-weight: 600;
    }
    #goal-bar-outer {
      width: 110px; height: 12px;
      background: rgba(0,0,0,.15);
      border-radius: 2px; overflow: hidden;
      border: 1px solid rgba(0,0,0,.18);
      /* ruler tick marks */
      background-image: repeating-linear-gradient(
        90deg, transparent, transparent 21px, rgba(0,0,0,.18) 22px
      );
    }
    #goal-bar-fill {
      height: 100%; background: var(--green);
      width: 0%; transition: width .7s ease;
    }

    /* ── Stage ─────────────────────────────────────────────────────────── */
    #stage { grid-area: stage; padding-top: 8px; /* clear folder lip */ }

    /* ── P&L panel — spiral notebook ───────────────────────────────────── */
    #pnl-panel {
      grid-area: pnl;
      background: var(--paper);
      border-radius: 3px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      border-left: 4px solid #d4a0a0; /* red margin line */
      padding: 1rem 1rem 1rem 1.25rem;
      overflow-y: auto;
      max-height: calc(100vh - 140px);
      align-self: start;
      position: sticky; top: 1.25rem;
      /* ruled lines */
      background-image: repeating-linear-gradient(
        180deg, transparent, transparent 23px, rgba(100,140,200,.13) 24px
      );
    }
    #pnl-panel.hidden { display: none; }
    #pnl-panel h2 {
      font-family: var(--font-hand); font-size: 1.2rem;
      font-weight: 700; margin-bottom: .75rem; color: var(--yellow-dk);
    }
    #ledger-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
    #ledger-table th {
      text-align: left; padding: 4px 6px;
      background: rgba(245,197,24,.25); color: var(--yellow-dk);
      font-family: var(--font-hand); font-size: .88rem;
      font-weight: 700; border-bottom: 2px solid var(--yellow);
    }
    #ledger-table td { padding: 4px 6px; border-bottom: 1px solid rgba(196,168,112,.3); }
    #ledger-table tfoot td {
      font-weight: 700; background: rgba(245,197,24,.18);
      border-top: 2px solid var(--yellow); font-family: var(--font-hand);
    }
    .profit-cell { color: var(--green); font-weight: 700; }
    .loss-cell   { color: var(--red);   font-weight: 700; }
    #ledger-goal { margin-top: .75rem; font-size: .82rem; font-family: var(--font-hand); }
    #ledger-goal .goal-label { font-weight: 600; color: var(--muted); }

    /* ── Card base — paper pinned to board ─────────────────────────────── */
    .card {
      background: var(--paper);
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: var(--shadow-card);
      padding: 2rem 1.75rem 1.75rem;
      position: relative;
      overflow: visible;
    }
    /* washi tape strip — top left */
    .card::before {
      content: '';
      position: absolute;
      top: -11px; left: 22px;
      width: 58px; height: 22px;
      background: rgba(255,215,60,.52);
      transform: rotate(-2.5deg);
      border-radius: 2px;
      box-shadow: 0 1px 4px rgba(0,0,0,.14);
      z-index: 2;
    }
    /* second tape strip — top right on weather + ending cards */
    .weather-card::after,
    .ending-card::after {
      content: '';
      position: absolute;
      top: -9px; right: 28px;
      width: 50px; height: 20px;
      background: rgba(180,220,255,.52);
      transform: rotate(2deg);
      border-radius: 2px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      z-index: 2;
    }
    /* quiet day paper is warmer */
    .card.quiet-day {
      background: var(--paper-warm);
    }
    /* slight tilt per card type */
    .weather-card  { transform: rotate(.4deg); }
    .event-card    { transform: rotate(-.5deg); }
    .pnl-card      { transform: rotate(.25deg); }
    .ending-card   { transform: rotate(-.4deg); }
    .sim-card      { transform: rotate(.2deg); }

    /* ── Intro ─────────────────────────────────────────────────────────── */
    .intro-card { text-align: center; }
    .intro-card .big-emoji { font-size: 5rem; margin-bottom: 1rem; display: block; }
    .intro-card h2 {
      font-family: var(--font-hand); font-size: 2.4rem;
      font-weight: 800; margin-bottom: .5rem;
    }
    .intro-card p {
      color: var(--muted); line-height: 1.7; margin-bottom: 1.25rem;
      max-width: 480px; margin-left: auto; margin-right: auto;
    }

    /* ── Weather ───────────────────────────────────────────────────────── */
    .weather-card { text-align: center; }
    .weather-icon { font-size: 5rem; margin-bottom: .5rem; }
    .day-label {
      font-family: var(--font-hand); font-size: .9rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: .25rem;
    }
    .day-title {
      font-family: var(--font-hand); font-size: 2rem;
      font-weight: 800; margin-bottom: .5rem;
    }
    .weather-name {
      font-family: var(--font-hand); font-size: 1.3rem;
      font-weight: 700; color: var(--yellow-dk); margin-bottom: .25rem;
    }
    .weather-desc { color: var(--muted); margin-bottom: 1rem; }
    .weather-mult {
      display: inline-block; padding: 4px 14px;
      border-radius: 3px; font-family: var(--font-hand);
      font-size: 1rem; font-weight: 700; margin-bottom: 1rem;
      border: 2px solid currentColor;
    }
    .mult-up   { color: var(--green); border-color: var(--green); background: var(--green-lt); }
    .mult-down { color: var(--red);   border-color: var(--red);   background: var(--red-lt);   }
    .mult-same { color: var(--yellow-dk); border-color: var(--yellow-dk); background: var(--yellow-lt); }

    /* ── Event / narrative ─────────────────────────────────────────────── */
    .event-card .event-tag {
      display: inline-block; font-family: var(--font-hand);
      font-size: .85rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; padding: 3px 10px; border-radius: 3px;
      margin-bottom: .9rem; border: 2px solid currentColor;
    }
    .tag-hoa     { color: #1d4ed8; background: #dce8ff; }
    .tag-mob     { color: #5b21b6; background: #ede8ff; }
    .tag-bully   { color: #9a3412; background: #ffebe0; }
    .tag-quiet   { color: var(--green); background: var(--green-lt); }
    .tag-warning { color: var(--red); background: var(--red-lt); }
    .narrative   { line-height: 1.8; margin-bottom: 1rem; font-size: .97rem; }
    .narrative strong { color: var(--ink); }

    /* ── Choices — index cards ──────────────────────────────────────────── */
    .choices { display: flex; flex-direction: column; gap: .85rem; margin-top: 1.25rem; }
    .choice-btn {
      display: flex; flex-direction: column; gap: 4px;
      width: 100%; text-align: left;
      padding: 1.1rem 1.4rem 1.1rem 1.3rem;
      background: #fffef5;
      border: 1px solid var(--border);
      border-left: 5px solid var(--yellow-dk);
      border-radius: 2px;
      box-shadow: 2px 2px 0 #c4a870, 3px 3px 6px rgba(0,0,0,.10);
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, border-left-color .15s, background .15s;
      font-family: inherit;
    }
    .choice-btn:hover {
      transform: translateX(5px);
      box-shadow: 4px 4px 0 #b09050, 5px 5px 10px rgba(0,0,0,.14);
      border-color: var(--yellow-dk); border-left-width: 6px;
      background: var(--yellow-lt);
    }
    .choice-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #c4a870;
    }
    .choice-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .choice-btn .c-label {
      font-family: var(--font-hand); font-weight: 700; font-size: 1.2rem;
    }
    .choice-btn .c-hint { font-size: .88rem; color: var(--muted); }

    /* ── Simulation ────────────────────────────────────────────────────── */
    .sim-card { text-align: center; }
    .sim-card .sim-emoji { font-size: 3.5rem; margin-bottom: .5rem; }
    .cup-counter {
      font-family: var(--font-hand); font-size: 4.5rem;
      font-weight: 900; color: var(--yellow-dk);
      margin: .5rem 0; line-height: 1;
    }
    .cup-label { color: var(--muted); font-family: var(--font-hand); font-size: 1rem; margin-bottom: 1rem; }
    .sim-bar-outer {
      width: 100%; height: 14px;
      background: rgba(0,0,0,.10);
      border-radius: 2px; overflow: hidden; margin-bottom: 1rem;
      border: 1px solid rgba(0,0,0,.12);
    }
    .sim-bar-fill {
      height: 100%; background: var(--yellow);
      width: 0%; transition: width 1.5s ease;
    }

    /* ── P&L result card ───────────────────────────────────────────────── */
    .pnl-card h3 {
      font-family: var(--font-hand); font-size: 1.5rem;
      font-weight: 800; margin-bottom: 1rem;
    }
    .result-table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: .92rem; }
    .result-table td { padding: 6px 2px; border-bottom: 1px solid rgba(196,168,112,.3); }
    .result-table td:last-child { text-align: right; font-weight: 600; }
    .result-table .total-row td {
      font-family: var(--font-hand); font-weight: 800; font-size: 1.1rem;
      border-top: 2px solid var(--border); border-bottom: none; padding-top: 10px;
    }
    .profit-banner {
      text-align: center; padding: .85rem; border-radius: 3px;
      font-family: var(--font-hand); font-size: 1.6rem;
      font-weight: 900; margin-bottom: 1rem;
      border: 3px solid currentColor;
      transform: rotate(-1deg);
    }
    .profit-banner.pos { background: var(--green-lt); color: var(--green); }
    .profit-banner.neg { background: var(--red-lt);   color: var(--red);   }

    /* ── Ending ────────────────────────────────────────────────────────── */
    .ending-card { text-align: center; }
    .ending-card .end-emoji { font-size: 5.5rem; margin-bottom: 1rem; display: block; }
    .ending-card h2 {
      font-family: var(--font-hand); font-size: 2.4rem;
      font-weight: 900; margin-bottom: .5rem;
    }
    .ending-card .end-sub {
      font-family: var(--font-hand); font-size: 1.1rem;
      color: var(--muted); margin-bottom: 1rem;
    }
    .ending-card .end-body {
      line-height: 1.8; margin-bottom: 1.5rem;
      max-width: 520px; margin-left: auto; margin-right: auto;
    }
    .final-stats { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .stat-box {
      background: #fff; border-radius: 2px; padding: .75rem 1.25rem;
      text-align: center;
      box-shadow: 2px 2px 0 #c4a870, 3px 3px 8px rgba(0,0,0,.12);
    }
    .stat-box .s-val {
      font-family: var(--font-hand); font-size: 1.8rem;
      font-weight: 900; color: var(--yellow-dk);
    }
    .stat-box .s-lbl {
      font-family: var(--font-hand); font-size: .8rem;
      color: var(--muted); font-weight: 600; text-transform: uppercase;
    }

    /* ── Buttons — rubber stamp ─────────────────────────────────────────── */
    .btn-primary {
      display: inline-block; padding: 1rem 2.5rem;
      background: var(--yellow); color: var(--ink);
      font-family: var(--font-hand); font-weight: 800;
      font-size: 1.3rem; letter-spacing: .04em;
      border: 3px solid var(--yellow-dk); border-radius: 4px; cursor: pointer;
      box-shadow: 4px 4px 0 #8a6a00, 5px 5px 12px rgba(0,0,0,.20);
      transition: transform .1s, box-shadow .1s;
      position: relative;
    }
    .btn-primary:hover  { filter: brightness(1.05); }
    .btn-primary:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 #8a6a00, 1px 1px 4px rgba(0,0,0,.15);
    }
    .btn-secondary {
      display: inline-block; padding: .85rem 1.75rem;
      background: var(--paper); color: var(--text);
      font-family: var(--font-hand); font-weight: 700; font-size: 1.1rem;
      border: 2px solid var(--border); border-radius: 3px;
      box-shadow: 2px 2px 0 var(--border);
      cursor: pointer; transition: transform .1s, box-shadow .1s;
      margin-left: .5rem;
    }
    .btn-secondary:hover { filter: brightness(.97); }
    .btn-secondary:active { transform: translate(2px,2px); box-shadow: none; }

    .mt1 { margin-top: 1rem; }
    .sep  { margin: 1rem 0; border: none; border-top: 1px dashed var(--border); }

    /* ── Good-will mood lines (invisible meter, tone-only feedback) ──── */
    .gw-mood {
      font-style: italic;
      color: var(--muted);
      font-size: .93em;
      border-left: 3px solid var(--border);
      padding-left: .75rem;
      margin: .5rem 0 .75rem;
    }
  </style>
</head>
<body>
<div id="app">
  <header id="game-header">
    <h1>🍋 Lemonade Stand</h1>
    <div id="hud-right">
      <div id="day-dots"></div>
      <div id="profit-display">$0.00</div>
      <div id="goal-bar-wrap">
        <span>Goal $45</span>
        <div id="goal-bar-outer"><div id="goal-bar-fill"></div></div>
        <span id="goal-pct">0%</span>
      </div>
    </div>
  </header>
  <main id="stage"></main>
  <aside id="pnl-panel" class="hidden">
    <h2>📊 Running Ledger</h2>
    <table id="ledger-table">
      <thead>
        <tr>
          <th>Day</th><th>☁</th><th>Cups</th><th>Rev</th><th>Costs</th><th>Net</th>
        </tr>
      </thead>
      <tbody id="ledger-body"></tbody>
      <tfoot id="ledger-foot"></tfoot>
    </table>
    <div id="ledger-goal" class="mt1"></div>
  </aside>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════ */
const BASE_CUSTOMERS = 40;
const BASE_PRICE     = 1.00;
const COST_PER_CUP   = 0.28; // lemons .15 + sugar .08 + cup .05
const GOAL           = 45;

const WEATHER = {
  sunny:  { label: 'Sunny',     emoji: '☀️',  mult: 1.00, desc: 'A perfect summer day — everyone wants a cold drink.', tag: 'mult-same' },
  cloudy: { label: 'Cloudy',    emoji: '☁️',  mult: 0.85, desc: 'Mild and pleasant. Traffic is a little light.', tag: 'mult-down' },

/* ═══════════════════════════════════════════════════════════════
   GOOD WILL HELPERS
   Invisible relationship meter (0–100) per character.
   High = character is warm toward the player.
   Low  = character is cold / guarded / threatening.
   The meter never surfaces as UI — only as tone in dialogue.
═══════════════════════════════════════════════════════════════ */
function adjustGW(s, adj) {
  for (const [char, delta] of Object.entries(adj)) {
    if (s.goodWill[char] !== undefined) {
      s.goodWill[char] = Math.max(0, Math.min(100, s.goodWill[char] + delta));
    }
  }
}

// Returns 'warm' (>70) | 'neutral' (40–70) | 'cool' (20–40) | 'hostile' (<20)
function gwTone(s, char) {
  const v = s.goodWill[char] ?? 50;
  if (v > 70) return 'warm';
  if (v > 40) return 'neutral';
  if (v > 20) return 'cool';
  return 'hostile';
}

// Returns a short italicised mood beat for a character, or '' if neutral.
function gwMood(s, char) {
  const tone = gwTone(s, char);
  if (tone === 'neutral') return '';
  const MOODS = {
    pemberton: {
      warm:    `<p class="narrative gw-mood">Pemberton's clipboard is tucked under his arm — almost relaxed. He gives you a nod that's closer to neighbourly than official.</p>`,
      cool:    `<p class="narrative gw-mood">Pemberton approaches with his clipboard already raised. Whatever goodwill existed between you has clearly curdled into something more official.</p>`,
      hostile: `<p class="narrative gw-mood">Pemberton is already writing something down before he's within earshot. His expression says the pleasantries are over.</p>`,
    },
    bigSal: {
      warm:    `<p class="narrative gw-mood">Big Sal carries himself the way he does when he's decided someone is worth his patience — unhurried, almost cordial.</p>`,
      cool:    `<p class="narrative gw-mood">Something in Big Sal's posture has shifted. The pleasantries feel thinner than before.</p>`,
      hostile: `<p class="narrative gw-mood">Big Sal's patience has a bottom, and you get the sense you're near it. The smile is still there — but it's load-bearing now.</p>`,
    },
    mrsChen: {
      warm:    `<p class="narrative gw-mood">Mrs. Chen's whole face opens up when she sees you — the kind of smile that means she's been telling people about you.</p>`,
      cool:    `<p class="narrative gw-mood">Mrs. Chen hesitates a beat before coming over. She smiles, but it's the careful kind — the smile of someone who's decided to reserve judgment.</p>`,
      hostile: `<p class="narrative gw-mood">Mrs. Chen keeps her distance today. She gives you a look that isn't unkind, exactly — but she doesn't close the gap between you either.</p>`,
    },
    mrOkafor: {
      warm:    `<p class="narrative gw-mood">Mr. Okafor approaches with purpose — the walk of someone who has something to offer and is pleased to offer it.</p>`,
      cool:    `<p class="narrative gw-mood">Mr. Okafor pauses longer than usual before approaching, as if he's still weighing something up.</p>`,
      hostile: `<p class="narrative gw-mood">Mr. Okafor glances your way, then seems to think twice. When he finally comes over, there's a politeness to it that keeps you at arm's length.</p>`,
    },
  };
  return MOODS[char]?.[tone] ?? '';
}

/* ═══════════════════════════════════════════════════════════════
   P&L ENGINE
═══════════════════════════════════════════════════════════════ */
function simulateSales(s) {
  const w = WEATHER[s.day.weather];
  const wMult = w ? w.mult : 1.0;

  // Flag-driven customer bonuses
  let flagMult = 1.0;
  const d = s.currentDay;
  if (s.flags.seniorNetwork && d >= 3) flagMult *= 1.10;
  if (s.flags.dogWalkerReg  && d >= 3 && d <= 4) flagMult *= 1.08;
  if (s.flags.secretRecipe  && d >= 5) flagMult *= 1.15;
  if (s.flags.mobFront      && d >= 4) flagMult *= 1.40;

  const price = s.day.pricePerCup;
  const priceEffect = Math.max(0.2, 1.0 - (price - 1.0) * 0.3);

  let customers = Math.floor(BASE_CUSTOMERS * wMult * s.day.customerMult * flagMult * priceEffect);
  if (s.day.cappedDemand) customers = Math.floor(customers * 0.60);

  const revenue        = +(customers * price).toFixed(2);
  const ingredientCost = +(customers * COST_PER_CUP).toFixed(2);
  const extraCost      = +s.day.extraCost.toFixed(2);

  // Charity mode: $1/cup goes to charity (reduces effective revenue)
  let charityDonation = 0;
  if (s.day.charityMode) charityDonation = customers * 1.00; // $1 per cup donated

  const bonusIncome = +(s.day.bonusIncome || 0).toFixed(2);
  const grossProfit = revenue + bonusIncome - ingredientCost - extraCost - charityDonation;
  const mobCut    = s.flags.mobFront && !s.flags.tookBuyout && s.day.profitSplit > 0
    ? +(Math.max(0, grossProfit) * s.day.profitSplit).toFixed(2) : 0;
  const netProfit = +(grossProfit - mobCut).toFixed(2);

  return { customers, revenue, bonusIncome, ingredientCost, extraCost, charityDonation, mobCut, netProfit };
}

function applyMobFrontSplit(s) {
  if (s.flags.mobFront && !s.flags.tookBuyout) s.day.profitSplit = Math.max(s.day.profitSplit, 0.30);
}

function pushLedger(s, result) {
  const entry = {
    day:    s.currentDay,
    weather: s.day.weather,
    cups:   result.customers,
    revenue: result.revenue,
    ingredientCost: result.ingredientCost,
    extraCost: result.extraCost + result.charityDonation,
    mobCut:  result.mobCut,
    netProfit: result.netProfit,
    extraCostLabel: s.day.extraCostLabel,
    charityDonation: result.charityDonation,
  };
  s.ledger.push(entry);
  // recompute totals
  s.totals = s.ledger.reduce((t, e) => ({
    revenue:       +(t.revenue       + e.revenue).toFixed(2),
    ingredientCost:+(t.ingredientCost+ e.ingredientCost).toFixed(2),
    extraCost:     +(t.extraCost     + e.extraCost).toFixed(2),
    mobCut:        +(t.mobCut        + (e.mobCut||0)).toFixed(2),
    netProfit:     +(t.netProfit     + e.netProfit).toFixed(2),
  }), { revenue:0, ingredientCost:0, extraCost:0, mobCut:0, netProfit:0 });
}

/* ═══════════════════════════════════════════════════════════════
   ENDING KEY
═══════════════════════════════════════════════════════════════ */
function getEndingKey(s) {
  if (s.flags.hoaShutDown) return 'civics';
  const p = s.totals.netProfit;
  if (p >= GOAL) {
    if (s.flags.mobFront && !s.flags.tookBuyout) return 'dirty';
    if (s.flags.hoaCompliant && s.flags.secretRecipe) return 'aboveboard';
    return 'mogul';
  }
  if (p >= 20) return 'respectable';
  return 'character';
}

/* ═══════════════════════════════════════════════════════════════
   HUD UPDATE
═══════════════════════════════════════════════════════════════ */
function updateHud() {
  // Day dots
  const dots = document.getElementById('day-dots');
  dots.innerHTML = '';
  for (let i = 1; i <= 7; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < gs.currentDay ? ' done' : (i === gs.currentDay ? ' current' : ''));
    dots.appendChild(d);
  }
  // Profit
  const profit = gs.totals.netProfit;
  const pd = document.getElementById('profit-display');
  pd.textContent = fmt(profit);
  pd.style.color = profit >= 0 ? '#1a5c2a' : '#c0392b';
  // Goal bar
  const pct = Math.min(100, Math.max(0, (profit / GOAL) * 100)).toFixed(0);
  document.getElementById('goal-bar-fill').style.width = pct + '%';
  document.getElementById('goal-pct').textContent = pct + '%';
  // Ledger
  updateLedger();
}

function updateLedger() {
  if (!gs.ledger.length) { document.getElementById('pnl-panel').classList.add('hidden'); return; }
  document.getElementById('pnl-panel').classList.remove('hidden');
  const body = document.getElementById('ledger-body');
  body.innerHTML = gs.ledger.map(e => {
    const w = WEATHER[e.weather];
    const cls = e.netProfit >= 0 ? 'profit-cell' : 'loss-cell';
    return `<tr>
      <td>${e.day}</td>
      <td title="${w ? w.label : ''}">${w ? w.emoji : '?'}</td>
      <td>${e.cups}</td>
      <td>${fmt(e.revenue)}</td>
      <td>${fmt(e.ingredientCost + e.extraCost + (e.mobCut||0))}</td>
      <td class="${cls}">${fmt(e.netProfit)}</td>
    </tr>`;
  }).join('');
  const t = gs.totals;
  document.getElementById('ledger-foot').innerHTML = `<tr>
    <td colspan="3"><strong>Total</strong></td>
    <td><strong>${fmt(t.revenue)}</strong></td>
    <td><strong>${fmt(t.ingredientCost + t.extraCost + t.mobCut)}</strong></td>
    <td class="${t.netProfit >= 0 ? 'profit-cell' : 'loss-cell'}"><strong>${fmt(t.netProfit)}</strong></td>
  </tr>`;
  const goalPct = Math.min(100, (t.netProfit / GOAL * 100)).toFixed(0);
  document.getElementById('ledger-goal').innerHTML =
    `<span class="goal-label">Goal $${GOAL}: </span>
     <strong style="color:${t.netProfit >= GOAL ? 'var(--green)' : 'var(--text)'}">${fmt(t.netProfit)} / $${GOAL} (${goalPct}%)</strong>`;
}

function fmt(n) {
  const abs = Math.abs(n).toFixed(2);
  return n < 0 ? `-$${abs}` : `$${abs}`;
}

/* ═══════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════ */
const stage = () => document.getElementById('stage');

function setStage(html) { stage().innerHTML = html; }

function btn(id, handler) {
  const el = document.getElementById(id);
  if (el) el.addEventListener('click', handler);
}

function renderChoiceButtons(choices, onPick) {
  // Consequences are intentionally hidden — they surface in narrative/P&L after the choice
  return choices.map((c, i) => `
    <button class="choice-btn" data-idx="${i}">
      <span class="c-label">${c.label}</span>
      ${c.hint ? `<span class="c-hint">${c.hint}</span>` : ''}
    </button>`).join('');
}

function attachChoiceBtns(choices, onPick) {
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      const idx = parseInt(btn.dataset.idx);
      onPick(choices[idx], idx);
    });
  });
}

/* ── SIMULATION ──────────────────────────────────────────────── */
function renderSimulation() {
  setScene('sim');
  // Apply mob front split before simulation
  if (gs.flags.mobFront && !gs.flags.tookBuyout && gs.currentDay >= 4) {
    gs.day.profitSplit = Math.max(gs.day.profitSplit, 0.30);
  }

  const result = simulateSales(gs);

  setStage(`
    <div class="card sim-card">
      <div class="sim-emoji">🍹</div>
      <div class="day-label">Day ${gs.currentDay} — Selling…</div>
      <div class="cup-counter" id="cup-count">0</div>
      <div class="cup-label">cups sold</div>
      <div class="sim-bar-outer"><div class="sim-bar-fill" id="sim-bar"></div></div>
    </div>`);

  // Animate
  const target = result.customers;
  const duration = 1500;
  const start = performance.now();
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    document.getElementById('cup-count').textContent = Math.floor(ease * target);
    const bar = document.getElementById('sim-bar');
    if (bar) bar.style.width = (ease * 100) + '%';
    if (t < 1) requestAnimationFrame(frame);
    else {
      document.getElementById('cup-count').textContent = target;
      if (bar) bar.style.width = '100%';
      setTimeout(() => { pushLedger(gs, result); renderPnL(result); }, 400);
    }
  }
  requestAnimationFrame(frame);
}

/* ── P&L RESULT ──────────────────────────────────────────────── */
function renderPnL(result) {
  setScene('pnl');
  updateHud();
  const isLast = gs.currentDay === 7;
  const profitClass = result.netProfit >= 0 ? 'pos' : 'neg';
  const rows = [
    ['Cups sold',         result.customers + ' cups'],
    ['Price per cup',     '$' + gs.day.pricePerCup.toFixed(2)],
    ['Revenue',          fmt(result.revenue)],
    ['— Ingredient costs', fmt(-result.ingredientCost)],
  ];
  if (result.bonusIncome > 0)  rows.push([`+ ${gs.day.bonusIncomeLabel || 'Bonus income'}`, fmt(result.bonusIncome)]);
  if (result.extraCost > 0)    rows.push([`— ${gs.day.extraCostLabel || 'Extra costs'}`, fmt(-result.extraCost)]);
  if (result.charityDonation > 0) rows.push(['— Charity donation', fmt(-result.charityDonation)]);
  if ((result.mobCut||0) > 0)  rows.push(['— Protection fee (Sal)', fmt(-result.mobCut)]);

  setStage(`
    <div class="card pnl-card">
      <h3>Day ${gs.currentDay} Results</h3>
      <table class="result-table">
        ${rows.map(([l,v]) => `<tr><td>${l}</td><td>${v}</td></tr>`).join('')}
        <tr class="total-row"><td>Net profit today</td><td>${fmt(result.netProfit)}</td></tr>
      </table>
      <div class="profit-banner ${profitClass}">
        ${result.netProfit >= 0 ? '+' : ''}${fmt(result.netProfit)} today
        &nbsp;·&nbsp; ${fmt(gs.totals.netProfit)} total
      </div>
      <button class="btn-primary" id="btn-next">
        ${isLast ? 'See Final Results 🏁' : 'Day ' + (gs.currentDay + 1) + ' →'}
      </button>
    </div>`);

  btn('btn-next', () => {
    if (isLast) { renderEnding(); }
    else { gs.currentDay++; renderWeather(); }
  });
}

/* ── SHUTDOWN (early ending) ─────────────────────────────────── */

  updateHud();
  setStage(`

      <span class="big-emoji">📜</span>
      <h2>Civics Lesson</h2>

      <p class="end-body">${ENDINGS.civics.body}</p>

        <div class="stat-box"><div class="s-val">${fmt(gs.totals.netProfit)}</div><div class="s-lbl">Total Profit</div></div>
      </div>
      <button class="btn-primary" id="btn-replay">Play Again</button>
    </div>`);

/* ── MOB TAKEOVER (early ending) ────────────────────────────── */
function renderMobShowdown() {
  setScene('mob');
  const choices = [
    {
      id: 'mob-join',
      label: "Fine. You win.",
      hint: "\"Okay, Sal. Whatever you want.\" You look at your feet.",
      effect(s) {
        s.flags.mobFront = true;
        s.day.profitSplit = 0.50; // Day 7 only, but Sal takes half
        s.day.customerMult *= 1.0; // mob harassment lifts
        // Restore some customers since harassment is lifted
        s.day.customerMult = Math.max(s.day.customerMult, 0.70);
      }
    },
    {
      id: 'mob-tribute',
      label: "I'll pay you. Just leave me alone today.",
      hint: "You reach into your money jar. $30. It hurts.",
      effect(s) {
        s.day.extraCost += 30; s.day.extraCostLabel = 'Mob tribute payment';
        s.day.customerMult *= 1.0;
        // Mob backs off — normal day resumes, harassment ends
        s.day.customerMult = Math.max(s.day.customerMult, 0.80);
      }
    },
    {
      id: 'mob-refuse',
      label: "No. I won't.",
      hint: "You look Sal in the eye. \"My stand. My rules.\"",
      effect(s) { s.flags.mobTakenOut = true; }
    },
  ];

  setStage(`
    <div class="card event-card" style="border:2px solid #6644cc">
      <span class="event-tag tag-mob">🕴️ Big Sal's Ultimatum</span>
      <p class="narrative" style="font-weight:700">
        Big Sal stands in front of you, blocking the sun. Behind him, the three men
        wait with their arms crossed. Every customer who walks by gets the look.
        They keep walking.
      </p>
      <p class="narrative">
        "Join us. Pay us. Or go home." He holds up one finger for each option.
        "You've already used up your chances, kid. This is the last conversation."
      </p>
      <hr class="sep">
      <p style="font-weight:700;margin-bottom:.5rem;">Your answer:</p>
      <div class="choices">${renderChoiceButtons(choices)}</div>
    </div>`);

  attachChoiceBtns(choices, (choice) => {
    choice.effect(gs);
    if (gs.flags.mobTakenOut) {
      setTimeout(() => renderMobTakeover(), 400);
    } else {
      setTimeout(() => renderDay7Sub3(), 400);
    }
  });
}

      <span class="big-emoji">🕴️</span>
      <h2 style="color:#e8d8f8">${ENDINGS.mobTakeover.title}</h2>

/* ── ENDING ──────────────────────────────────────────────────── */
function renderEnding() {
  const key = getEndingKey(gs);
  setScene('ending-' + key);
  const end = ENDINGS[key];
  updateHud();

  const totalCups = gs.ledger.reduce((s, e) => s + e.cups, 0);
  const bestDay   = gs.ledger.reduce((b, e) => e.netProfit > b.netProfit ? e : b, gs.ledger[0]);

  setStage(`
    <div class="card ending-card">
      <span class="big-emoji">${end.emoji}</span>
      <h2>${end.title}</h2>
      <p class="end-sub">${end.sub}</p>
      <p class="end-body">${end.body}</p>
      <div class="final-stats">
        <div class="stat-box">
          <div class="s-val">${fmt(gs.totals.netProfit)}</div>
          <div class="s-lbl">Total Profit</div>
        </div>
        <div class="stat-box">
          <div class="s-val">${totalCups}</div>
          <div class="s-lbl">Cups Sold</div>
        </div>
        <div class="stat-box">
          <div class="s-val">${fmt(gs.totals.revenue)}</div>
          <div class="s-lbl">Total Revenue</div>
        </div>
        <div class="stat-box">
          <div class="s-val">Day ${bestDay ? bestDay.day : '—'}</div>
          <div class="s-lbl">Best Day</div>
        </div>
      </div>
      <button class="btn-primary" id="btn-replay">Play Again</button>
      <button class="btn-secondary" id="btn-review">Review Ledger</button>
    </div>`);
  document.getElementById('pnl-panel').classList.remove('hidden');
  btn('btn-replay', () => { gs = freshState(); updateHud(); renderIntro(); });
  btn('btn-review', () => { document.getElementById('pnl-panel').scrollIntoView({ behavior: 'smooth' }); });
}

/* ═══════════════════════════════════════════════════════════════
   SCENE MANAGER
═══════════════════════════════════════════════════════════════ */
function setScene(name) {
  document.body.dataset.scene = name;
}

function sceneForDay(dayNum) {
  if (!dayNum || dayNum < 1) return 'intro';
  const cfg = DAYS[dayNum - 1];
  if (cfg.quiet) return 'quiet';
  if (cfg.eventTag === 'tag-hoa') return 'hoa';
  if (cfg.eventTag === 'tag-mob') return 'mob';
  if (cfg.eventTag === 'tag-bully') return 'bully';
  return 'intro';
}

   BOOT

document.addEventListener('DOMContentLoaded', () => {
  gs = freshState();
  updateHud();
